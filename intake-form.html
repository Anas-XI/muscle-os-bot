let answers = {};
let submitted = false;
let lastResult = null;
let currentStep = 0;
let inbodyFileB64 = null;
let inbodyFileName = null;
let inbodyFileSize = null;
let inbodyData = { scanDate:'', device:'', weight_kg:'', smm_kg:'', bfm_kg:'', bf_pct:'', bmi:'', bmr_kcal:'', visceral_fat:'', tbw_L:'', icw_L:'', ecw_L:'', ecw_tbw_ratio:'', seg_rArm_kg:'', seg_lArm_kg:'', seg_trunk_kg:'', seg_rLeg_kg:'', seg_lLeg_kg:'' };

const TEXT_TYPES = ['text','number','textarea','checkboxes'];
const isTextQ = q => TEXT_TYPES.includes(q.type);

function visibleQuestions(sectionNum) {
  return QUESTIONS.filter(q => {
    if (q.section !== sectionNum) return false;
    if (q.id === 'Q25' && (answers['Q24'] === '0' || !answers['Q24'])) return false;
    if ((q.id === 'Q32' || q.id === 'Q57') && (answers['Q20'] === 'no' || !answers['Q20'])) return false;
    if ((q.id === 'Q38' || q.id === 'Q39' || q.id === 'Q40') && answers['Q8'] !== 'female') return false;
    return true;
  });
}

function getScreenList() {
  const screens = [];
  SECTION_META.forEach(meta => {
    const qs = visibleQuestions(meta.section);
    if (qs.length > 0) screens.push({ type:'section', meta, questions:qs });
  });
  screens.push({ type:'inbody', meta:{ emoji:'\uD83D\uDCCA', label:'Body Composition Scan', desc:'Optional — upload DEXA / InBody report' } });
  screens.push({ type:'review', meta:{ emoji:'\u2705', label:'Review & Submit', desc:'Confirm your answers before submitting' } });
  return screens;
}

function getRequiredCount() {
  const allQs = QUESTIONS.filter(q => !isTextQ(q) && q.options && q.options.length > 1 && !(q.id === 'Q25' && (answers['Q24']==='0'||!answers['Q24'])) && !(q.id === 'Q32' && (answers['Q20']==='no'||!answers['Q20'])) && !(q.id === 'Q57' && (answers['Q20']==='no'||!answers['Q20'])) && !((q.id === 'Q38' || q.id === 'Q39' || q.id === 'Q40') && answers['Q8'] !== 'female'));
  return allQs;
}

function inbodyFieldHtml(field, label, type, placeholder) {
  const val = inbodyData[field] !== undefined && inbodyData[field] !== '' ? inbodyData[field] : '';
  return `<div class="inbody-field"><label>${label}</label><input type="${type}" id="inbody_${field}" value="${val}" oninput="setInbodyMetric('${field}',this.value)" placeholder="${placeholder||''}" class="inbody-input"></div>`;
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function handleInbodyFile(file) {
  if (!file) return;
  if (!file.name.match(/\.(pdf|jpg|jpeg|png)$/i)) return;
  inbodyFileName = file.name;
  inbodyFileSize = formatFileSize(file.size);
  const reader = new FileReader();
  reader.onload = function(e) { inbodyFileB64 = e.target.result.split(',')[1]; render(); };
  reader.readAsDataURL(file);
}

function removeInbodyFile() {
  inbodyFileB64 = null;
  inbodyFileName = null;
  inbodyFileSize = null;
  const input = document.getElementById('inbodyFileInput');
  if (input) input.value = '';
  render();
}

function setInbodyMetric(field, value) {
  inbodyData[field] = value;
  if ((field === 'ecw_L' || field === 'tbw_L') && inbodyData.ecw_L && inbodyData.tbw_L) {
    const ecw = parseFloat(inbodyData.ecw_L);
    const tbw = parseFloat(inbodyData.tbw_L);
    if (ecw && tbw && !isNaN(ecw) && !isNaN(tbw) && tbw > 0) {
      inbodyData.ecw_tbw_ratio = (ecw / tbw).toFixed(3);
      const el = document.getElementById('inbody_ecw_tbw_ratio');
      if (el) el.value = inbodyData.ecw_tbw_ratio;
    }
  }
}

function setAnswer(id, value) {
  answers[id] = value;
  render();
}

function setTextAnswer(id, value) {
  answers[id] = value;
  updateProgressBar();
}

function toggleCheckbox(id, value) {
  if (!answers[id]) answers[id] = [];
  const arr = answers[id];
  if (value === 'none') {
    answers[id] = arr.includes('none') ? [] : ['none'];
  } else {
    const idx = arr.indexOf('none');
    if (idx !== -1) arr.splice(idx, 1);
    const vi = arr.indexOf(value);
    if (vi === -1) arr.push(value);
    else arr.splice(vi, 1);
  }
  render();
}

function updateProgressBar() {
  const screens = getScreenList();
  const total = screens.length;
  const pct = total > 0 ? Math.round(((currentStep + 1) / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  const label = document.getElementById('stepLabel');
  const screen = screens[currentStep];
  if (screen) {
    label.textContent = `Step ${currentStep + 1}/${total} — ${screen.meta.emoji} ${screen.meta.label}`;
  }
}

function isCurrentScreenComplete(screen) {
  if (screen.type === 'inbody' || screen.type === 'review') return true;
  const qs = screen.questions.filter(q => !isTextQ(q) && q.options && q.options.length > 1);
  return qs.every(q => answers[q.id]);
}

function render() {
  const body = document.getElementById('formBody');
  const nav = document.getElementById('navArea');
  const resultArea = document.getElementById('resultArea');

  if (submitted && lastResult) {
    body.innerHTML = '';
    nav.innerHTML = '';
    renderResult(lastResult);
    return;
  }

  const screens = getScreenList();
  const screen = screens[currentStep];
  if (!screen) return;

  updateProgressBar();

  if (screen.type === 'inbody') {
    renderInbodyScreen(body, nav, screens, screen);
  } else if (screen.type === 'review') {
    renderReviewScreen(body, nav, screens);
  } else {
    renderQuestionScreen(body, nav, screens, screen);
  }
}

function renderQuestionScreen(body, nav, screens, screen) {
  const meta = screen.meta;
  let html = `<div class="section"><div class="section-header"><span class="section-emoji">${meta.emoji}</span><span class="section-title">${meta.label}</span></div>`;
  if (meta.desc) html += `<div class="section-desc">${meta.desc}</div>`;

  if (meta.section === 9) {
    html += `<div class="ed-safe">The following questions help us ensure your program is safe and appropriate for your relationship with food and body image. Please answer honestly — all responses are confidential.</div>`;
  }

  screen.questions.forEach(q => {
    if (q.type==='text'||q.type==='number') {
      html += `<div class="q"><div class="q-label">${q.label}</div><input type="${q.type}" id="${q.id}" class="fill-input" placeholder="${q.placeholder||''}" value="${answers[q.id]||''}" oninput="setTextAnswer('${q.id}',this.value)"></div>`;
    } else if (q.type==='textarea') {
      html += `<div class="q"><div class="q-label">${q.label}</div><textarea id="${q.id}" class="fill-input fill-textarea" placeholder="${q.placeholder||''}" oninput="setTextAnswer('${q.id}',this.value)">${answers[q.id]||''}</textarea></div>`;
    } else if (q.type==='checkboxes') {
      const selected = answers[q.id] || [];
      html += `<div class="q"><div class="q-label">${q.label}</div><div class="chk-group">`;
      q.options.forEach(o => {
        const checked = selected.includes(o.value);
        html += `<label class="chk-item"><input type="checkbox" value="${o.value}" ${checked?'checked':''} onchange="toggleCheckbox('${q.id}','${o.value}')"><span>${o.label}</span></label>`;
      });
      html += `</div></div>`;
    } else {
      if (!q.options || q.options.length <= 1) return;
      const sel = answers[q.id];
      html += `<div class="q"><div class="q-label">${q.label}</div><div class="opts">`;
      q.options.forEach(o => {
        const idAttr = `${q.id}_${o.value}`;
        html += `<input type="radio" name="${q.id}" id="${idAttr}" value="${o.value}"${sel===o.value?' checked':''} onchange="setAnswer('${q.id}','${o.value}')"><label for="${idAttr}" class="${sel===o.value?'selected':''}">${o.label}</label>`;
      });
      html += `</div></div>`;
    }
  });

  html += `</div>`;
  body.innerHTML = html;

  const complete = isCurrentScreenComplete(screen);
  const isFirst = currentStep === 0;
  const isLast = currentStep >= screens.length - 1;
  let navHtml = '';
  if (!isFirst) navHtml += `<button class="btn btn-secondary" onclick="goStep(-1)">\u2190 Back</button>`;
  navHtml += `<span class="nav-spacer"></span>`;
  if (isLast) {
    navHtml += `<button class="btn btn-primary" onclick="submitForm()" ${complete?'':'disabled'}>${complete?'Submit Intake':'Answer all questions to submit'}</button>`;
  } else {
    navHtml += `<button class="btn btn-primary" onclick="goStep(1)" ${complete?'':'disabled'}>Next \u2192</button>`;
  }
  nav.innerHTML = navHtml;
}

function renderInbodyScreen(body, nav, screens) {
  let html = `<div class="section"><div class="section-header"><span class="section-emoji">\uD83D\uDCCA</span><span class="section-title">Body Composition Scan</span><span class="inbody-optional-badge">Optional</span></div><div class="section-desc">Upload a DEXA / InBody report and optionally enter metrics manually</div>`;

  if (inbodyFileName) {
    html += `<div class="upload-zone has-file" id="inbodyUploadZone" onclick="document.getElementById('inbodyFileInput').click();"><div style="display:flex;align-items:center;justify-content:center;gap:10px;"><span style="font-size:12px;color:#d4d4d8;">${inbodyFileName}</span><span style="font-size:11px;color:#71717a;">(${inbodyFileSize})</span><span onclick="event.stopPropagation();removeInbodyFile();" style="cursor:pointer;color:#ef4444;font-weight:700;font-size:16px;line-height:1;">\u00d7</span></div></div>`;
  } else {

  html += inbodyFieldHtml('tbw_L','TBW (L)','number','e.g. 38.4');
  html += inbodyFieldHtml('icw_L','ICW (L)','number','e.g. 25.1');

  html += `</div>`;
  html += `<div class="inbody-section-label" style="font-size:11px;color:#a1a1aa;margin-top:14px;margin-bottom:6px;">Segmental Lean Mass (kg) — optional, InBody 570+ only</div><div class="inbody-grid-5">`;

function goStep(delta) {
  const screens = getScreenList();
  const newStep = currentStep + delta;
  if (newStep < 0 || newStep >= screens.length) return;
  currentStep = newStep;
  render();
}

function updateProgress() {
  updateProgressBar();
}

// ----- Scoring -----
function compute() {
  const flags = [];
  const scores = { trainingHistory:0, nutrition:0, recovery:0, adherence:0, cardio:0 };

  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    if (!ans || !q.options) return;
    if (Array.isArray(ans)) {
      ans.forEach(a => { const o = q.options.find(x => x.value === a); if (o && o.flag) flags.push(o.flag); });
    } else {
      const o = q.options.find(x => x.value === ans);
      if (o && o.flag) flags.push(o.flag);
    }
  });

  ['Q1','Q2','Q3'].forEach(id => { const q=QUESTIONS.find(x=>x.id===id); const o=q.options.find(x=>x.value===answers[id]); if(o&&o.score) scores.trainingHistory+=o.score; });
  ['Q53','Q9','Q10','Q11','Q27'].forEach(id => { const q=QUESTIONS.find(x=>x.id===id); const o=q.options.find(x=>x.value===answers[id]); if(o&&o.score) scores.nutrition+=o.score; });
  ['Q13','Q14','Q56','Q15','Q16'].forEach(id => { const q=QUESTIONS.find(x=>x.id===id); const o=q.options.find(x=>x.value===answers[id]); if(o&&o.score) scores.recovery+=o.score; });
  ['Q67','Q68','Q69','Q70'].forEach(id => { const q=QUESTIONS.find(x=>x.id===id); const o=q.options.find(x=>x.value===answers[id]); if(o&&o.score) scores.recovery+=o.score; });
  ['Q63','Q64'].forEach(id => { const q=QUESTIONS.find(x=>x.id===id); const o=q.options.find(x=>x.value===answers[id]); if(o&&o.score) scores.recovery+=o.score; });
  const q22=QUESTIONS.find(x=>x.id==='Q22'); const o22=q22.options.find(x=>x.value===answers.Q22); if(o22&&o22.score) scores.adherence+=o22.score;
  const q24=QUESTIONS.find(x=>x.id==='Q24'); const o24=q24.options.find(x=>x.value===answers.Q24); if(o24&&o24.score) scores.cardio+=o24.score;
  scores.total = scores.trainingHistory + scores.nutrition + scores.recovery + scores.adherence + scores.cardio;

  const timeConstraint = (answers.Q17==='1_or_fewer'||answers.Q18==='under_30')?'severe':(answers.Q17==='2'||answers.Q18==='30_45')?'moderate':'none';
  const equipmentMap = { bodyweight:'minimal', home_light:'home_light', home_full:'home_full', commercial:'full' };
  const equipment = equipmentMap[answers.Q19] || 'na';
  const injuryMap = { minor:'minor', moderate:'moderate', significant:'major' };
  const injury = injuryMap[answers.Q20] || 'none';
  const injuryLocation = answers.Q32 || 'none';
  const injuryDescription = answers.Q57 || '';
  const lifeMap = { high:'high', very_high:'very_high', moderate:'moderate' };
  const lifestyleConstraint = lifeMap[answers.Q21] || 'none';
  const workTypeMap = { sedentary:'sedentary', standing:'standing', active:'active', physical_labor:'physical_labor', mixed:'mixed' };
  const workType = workTypeMap[answers.Q33] || 'unknown';
  const travelMap = { never:'never', monthly_or_less:'monthly_or_less', weekly:'weekly', often:'often' };
  const travelFreq = travelMap[answers.Q34] || 'never';
  const adherenceFlag = flags.includes('Critical adherence gap')?'critical':flags.includes('Adherence gap')?'gap':flags.includes('Serious adherence issue')?'serious':flags.includes('Perfectionism pattern')?'perfectionism':'none';
  const multipleDietHistory = answers.Q12 === 'yes';
  const edConcern = flags.some(f=>f.includes('ED screening'));

  const cardioProfile = { sessionsPerWeek:answers.Q24||'0', primaryType:answers.Q25||'none', dailySteps:answers.Q26||'unknown' };
  const sleepProfile = { chronotype:answers.Q30||'intermediate', caffeineAmount:answers.Q56||'none', caffeineTiming:answers.Q31||'morning_only', dailyWaterL:parseFloat(answers.Q66)||null, urineColor:answers.Q67||'', muscleCramps:answers.Q68||'', alcoholWeekly:answers.Q69||'0', alcoholNearBed:answers.Q70||'no_alcohol' };
  const psychProfile = { motivationSource:answers.Q35||'results', selfExperimentation:answers.Q36||'neutral', accountabilityPref:answers.Q37||'self' };
  const suppList = Array.isArray(answers.Q55) ? answers.Q55 : (answers.Q55 ? [answers.Q55] : []);
  const nutritionDetail = { fiberServings:answers.Q27||'0_1', supplements:suppList, digestiveHealth:answers.Q29||'good', eatingWindow:answers.Q54||'normal', calorieEstimate:answers.Q53||'dont_track', bowelFrequency:answers.Q62||'', fermentedFoods:answers.Q63||'', antibioticUse:answers.Q64||'', supplementRegimen:answers.Q65||'', veganYearsUnsupplemented:answers.Q101||'' };
  const femaleHealth = { trackCycle:answers.Q38||'na', contraception:answers.Q39||'na', pregnancyStatus:answers.Q40||'na' };
  const trainingSplit = answers.Q51||'unknown';
  const mainLifts = answers.Q52||'';
  const targetWeight = answers.Q50||'';
  const height = answers.Q49||'';
  const name = answers.Q45||'';
  const injuryDesc = answers.Q57||'';

  const archetype = computeArchetype(scores, flags, answers);
  const pillarPriorities = computePillars(scores, flags, answers);

  const inbodyFlags = [];
  const w = parseFloat(inbodyData.weight_kg);
  const smm = parseFloat(inbodyData.smm_kg);
  const bfm = parseFloat(inbodyData.bfm_kg);
  const vf = parseFloat(inbodyData.visceral_fat);
  const ecw = parseFloat(inbodyData.ecw_L);
  const tbw = parseFloat(inbodyData.tbw_L);
  const rArm = parseFloat(inbodyData.seg_rArm_kg);
  const lArm = parseFloat(inbodyData.seg_lArm_kg);
  const rLeg = parseFloat(inbodyData.seg_rLeg_kg);
  const lLeg = parseFloat(inbodyData.seg_lLeg_kg);
  const hm = parseFloat(height);

  if (vf > 10) inbodyFlags.push('High visceral fat (>10) — cardiovascular risk factor');
  if (ecw && tbw && !isNaN(ecw) && !isNaN(tbw) && tbw > 0) {
    const ratio = ecw / tbw;
    if (ratio >= 0.390) inbodyFlags.push('High ECW/TBW ratio — refer to medical before aggressive deficit');
    else if (ratio >= 0.380) inbodyFlags.push('Elevated ECW/TBW ratio — possible inflammation or fluid retention');
  }
  if (rArm && lArm && !isNaN(rArm) && !isNaN(lArm) && rArm > 0 && lArm > 0) {
    const armDiff = Math.abs(rArm - lArm) / Math.max(rArm, lArm) * 100;
    if (armDiff > 10) inbodyFlags.push(`Arm lean mass asymmetry (${Math.round(armDiff)}%) — unilateral accessory work indicated`);
  }
  if (rLeg && lLeg && !isNaN(rLeg) && !isNaN(lLeg) && rLeg > 0 && lLeg > 0) {
    const legDiff = Math.abs(rLeg - lLeg) / Math.max(rLeg, lLeg) * 100;
    if (legDiff > 10) inbodyFlags.push(`Leg lean mass asymmetry (${Math.round(legDiff)}%) — unilateral accessory work indicated`);
  }
  if (w && smm && !isNaN(w) && !isNaN(smm) && w > 0) {
    const smmPct = smm / w * 100;
    if (smmPct < 28) inbodyFlags.push('Low skeletal muscle % — prioritise muscle retention in any deficit');
  }

  flags.push(...inbodyFlags);

  const inbodyHasData = inbodyFileB64 || Object.values(inbodyData).some(v => v !== '');
  let lbm = null, ffmi = null;
  if (w && bfm && !isNaN(w) && !isNaN(bfm) && w > 0) {
    lbm = Math.round((w - bfm) * 10) / 10;
    if (hm && !isNaN(hm) && hm > 0) {
      const hmM = hm / 100;
      ffmi = Math.round((lbm / (hmM * hmM)) * 10) / 10;
    }
  }
  const inbodyScan = {
    hasScan: !!inbodyHasData,
    fileName: inbodyFileName || '',
    fileBase64: inbodyFileB64 || '',
    scanDate: inbodyData.scanDate || '',
    device: inbodyData.device || '',
    metrics: {
      weight_kg: w || null,
      smm_kg: smm || null,
      bfm_kg: bfm || null,
      bf_pct: inbodyData.bf_pct ? parseFloat(inbodyData.bf_pct) : null,
      bmi: inbodyData.bmi ? parseFloat(inbodyData.bmi) : null,
      bmr_kcal: inbodyData.bmr_kcal ? parseFloat(inbodyData.bmr_kcal) : null,
      visceral_fat: vf || null,
      tbw_L: inbodyData.tbw_L ? parseFloat(inbodyData.tbw_L) : null,
      icw_L: inbodyData.icw_L ? parseFloat(inbodyData.icw_L) : null,
      ecw_L: inbodyData.ecw_L ? parseFloat(inbodyData.ecw_L) : null,
      ecw_tbw_ratio: inbodyData.ecw_tbw_ratio ? parseFloat(inbodyData.ecw_tbw_ratio) : null,
      seg_rArm_kg: inbodyData.seg_rArm_kg ? parseFloat(inbodyData.seg_rArm_kg) : null,
      seg_lArm_kg: inbodyData.seg_lArm_kg ? parseFloat(inbodyData.seg_lArm_kg) : null,
      seg_trunk_kg: inbodyData.seg_trunk_kg ? parseFloat(inbodyData.seg_trunk_kg) : null,
      seg_rLeg_kg: inbodyData.seg_rLeg_kg ? parseFloat(inbodyData.seg_rLeg_kg) : null,
      seg_lLeg_kg: inbodyData.seg_lLeg_kg ? parseFloat(inbodyData.seg_lLeg_kg) : null
    },
    computed: { lbm_kg: lbm, ffmi },
    flags: inbodyFlags
  };
  if (!inbodyHasData) { inbodyScan.fileBase64 = ''; }

  const workSchedule = answers.Q71||'day_fixed';
  const reliableHours = answers.Q72||'';
  const mobilityLimitations = Array.isArray(answers.Q73) ? answers.Q73 : (answers.Q73 ? [answers.Q73] : []);
  const jointPain = answers.Q74||'no_pain';
  const lastBloodwork = answers.Q75||'';
  const knownDeficiencies = Array.isArray(answers.Q76) ? answers.Q76 : (answers.Q76 ? [answers.Q76] : []);
  const familyHistory = Array.isArray(answers.Q77) ? answers.Q77 : (answers.Q77 ? [answers.Q77] : []);
  const mentalHealthConcern = answers.Q78||'no';
  const mentalHealthCare = answers.Q79||'no';

  return { scores, flags:[...new Set(flags)], constraintProfile:{ timeConstraint, equipment, injury, injuryLocation, injuryDescription, lifestyleConstraint, adherenceFlag, multipleDietHistory, workType, travelFreq, edConcern, workSchedule, reliableHours, mobilityLimitations, jointPain }, nutritionDetail, sleepProfile, healthHistory:{ lastBloodwork, knownDeficiencies, familyHistory, veganYearsUnsupplemented:answers.Q101||'' }, mentalHealth:{ mentalHealthConcern, mentalHealthCare }, archetype, pillarPriorities, cardioProfile, psychProfile, femaleHealth, trainingSplit, mainLifts, targetWeight, height, name, injuryDesc, answers:{...answers}, inbodyScan };
}

function computeArchetype(scores, flags, answers) {
  const ts = scores.trainingHistory;
  const rs = scores.recovery;
  const age = answers.Q7;
  const goal = answers.Q6;
  const bf = answers.Q5;
  const eq = answers.Q19;
  const cardioSessions = answers.Q24;
  const hasInjury = flags.some(f=>f.toLowerCase().includes('injury'));
  const isEnduranceFocused = cardioSessions === '5_plus' || cardioSessions === '3_4';
  if (ts<=6 && !hasInjury) return 'Beginner';
  if (flags.includes('Severe time constraint')||(flags.some(f=>f.includes('Lifestyle'))&&flags.includes('High stress'))) return 'Busy Professional';
  if ((goal==='lose_significant'||goal==='lose_moderate')&&bf==='over_25') return 'Fat Loss Client';
  if (age==='55_plus'||(age==='40_54'&&rs<=8)) return 'Masters Athlete';
  if (isEnduranceFocused && ts>=7) return 'Endurance Hybrid';
  if (ts>=7&&ts<=13&&(eq==='commercial'||eq==='home_full')&&!flags.includes('Critical adherence gap')) return 'Intermediate Plateaued';
  if (ts>=14||(goal==='gain_muscle'&&ts>=10&&eq!=='minimal')) return 'Strength Athlete';
  return 'General';
}

function computePillars(scores, flags, answers) {
  const p = [];
  if (flags.some(f=>f.toLowerCase().includes('injury'))) p.push('Injury management — modify exercise selection before anything else');
  if (answers.Q40==='pregnant') p.push('Pregnancy — medical clearance required before any program change');
  if (answers.Q40==='postpartum_under_6mo') p.push('Postpartum return-to-training — follow phased protocol with medical clearance');
  if (scores.recovery<=12) p.push('Recovery maxing — recovery is your binding constraint');
  if (flags.some(f=>f.includes('sleep')||f.includes('Sleep'))) p.push('Sleep maxing — sleep is your priority');
  if (flags.some(f=>f.includes('ED screening'))) p.push('ED screening flagged — refer to medical before prescribing calorie deficit or weight target');
  if (scores.adherence<4) p.push('Simplify before optimizing — adherence is the foundation');
  if (scores.nutrition<=10) p.push('Diet maxing — protein and fiber are your first nutrition changes');
  if (answers.Q24==='5_plus' && scores.trainingHistory>=7) p.push('Concurrent training management — high cardio + resistance requires interference mitigation');
  if (scores.trainingHistory<=10) p.push('Training maxing — volume and program design are next');
  if (answers.Q51==='no_structure') p.push('Program structure — move from unstructured training to a consistent split');
  if (answers.Q54==='compressed') p.push('IF eating window — consider nutrient timing around training for performance');
  if (p.length===0) p.push('Solid foundation — focus on individualization and n-of-1 titration');
  return p;
}

// ----- Submit -----
function submitForm() {
  const allQs = getRequiredCount();
  const allAnswered = allQs.every(q => answers[q.id]);
  if (!allAnswered) return;
  lastResult = compute();
  submitted = true;
  render();
}

    'Fat Loss Client':['04_PROTOCOLS/Meal Structure','04_PROTOCOLS/Meal Prep','04_PROTOCOLS/Hydration','04_PROTOCOLS/Fluid And Meal Timing'],
    'Strength Athlete':['04_PROTOCOLS/Individualization Decision Protocol','04_PROTOCOLS/Deload','03_ASSESSMENTS/Training Load & Fatigue Assessment','05_JOURNAL/ (N-of-1 experiments)'],
    'Masters Athlete':['04_PROTOCOLS/Sleep Hygiene','04_PROTOCOLS/Deload','04_PROTOCOLS/Hydration','04_PROTOCOLS/Recovery Protocol'],
    'Endurance Hybrid':['04_PROTOCOLS/Training-Nutrition-Sleep Interaction Guide','04_PROTOCOLS/Hydration','04_PROTOCOLS/Meal Structure'],
    'General':['04_PROTOCOLS/Habit Building','04_PROTOCOLS/Meal Structure','04_PROTOCOLS/Hydration']
  };
  const protocols = protoMap[r.archetype] || ['04_PROTOCOLS/Habit Building','04_PROTOCOLS/Meal Structure'];
  protocols.forEach(p => { html += '<li>'+p+'</li>'; });
  html += `</ul></div>`;

  html += `<div class="result-section"><h3>What Muscle OS Provides</h3><ul class="what-list">${WHAT_PROVIDED.map(w=>'<li>'+w+'</li>').join('')}</ul></div>`;

  html += `<div class="result-section"><h3>Constraint Profile</h3><ul class="pillar-list">`;
  html += `<li>Equipment: ${r.constraintProfile.equipment}</li>`;
  html += `<li>Time: ${r.constraintProfile.timeConstraint}</li>`;
  html += `<li>Injury: ${r.constraintProfile.injury}${r.constraintProfile.injuryLocation!=='none'?' ('+r.constraintProfile.injuryLocation+')':''}${r.constraintProfile.injuryDescription?' — '+r.constraintProfile.injuryDescription:''}</li>`;
  html += `<li>Lifestyle: ${r.constraintProfile.lifestyleConstraint}</li>`;
  html += `<li>Work type: ${r.constraintProfile.workType}</li>`;
  html += `<li>Travel: ${r.constraintProfile.travelFreq}</li>`;
  html += `<li>Adherence: ${r.constraintProfile.adherenceFlag}</li>`;
  html += `<li>Multiple diet history: ${r.constraintProfile.multipleDietHistory?'Yes':'No'}</li>`;
  html += `<li>ED concern: ${r.constraintProfile.edConcern?'Yes — refer to medical':'None detected'}</li>`;
  html += `</ul></div>`;

  html += `<div class="result-section"><h3>Training Profile</h3><ul class="pillar-list">`;
  html += `<li>Split: ${r.trainingSplit||'unknown'}</li>`;
  html += `<li>Main lifts: ${r.mainLifts||'not provided'}</li>`;
  html += `<li>Target: ${r.targetWeight||'not specified'}</li>`;
  html += `</ul></div>`;

  html += `<div class="result-section"><h3>Cardio Profile</h3><ul class="pillar-list">`;
  html += `<li>Sessions: ${r.cardioProfile.sessionsPerWeek}/week</li>`;
  html += `<li>Type: ${r.cardioProfile.primaryType}</li>`;
  html += `<li>Steps: ${r.cardioProfile.dailySteps}</li>`;
  html += `</ul></div>`;

  html += `<div class="result-section"><h3>Sleep & Nutrition</h3><ul class="pillar-list">`;
  html += `<li>Chronotype: ${r.sleepProfile.chronotype}</li>`;
  html += `<li>Caffeine: ${r.sleepProfile.caffeineAmount}, ${r.sleepProfile.caffeineTiming}</li>`;
  html += `<li>Calories (est.): ${r.nutritionDetail.calorieEstimate}</li>`;
  html += `<li>Eating window: ${r.nutritionDetail.eatingWindow}</li>`;
  html += `<li>Motivation: ${r.psychProfile.motivationSource}</li>`;
  html += `<li>Accountability: ${r.psychProfile.accountabilityPref}</li>`;
  html += `</ul></div>`;

  html += `<div class="result-section" style="background:#1a2e1a;border:1px solid #22c55e33;border-radius:8px;padding:12px;"><h3 style="color:#22c55e;">Start Here</h3><p style="font-size:12px;color:#a1a1aa;line-height:1.5;">Open <strong>ADJUSTMENTS.md</strong> to see flag-to-action mappings. Then visit <strong>07_PROFILES/</strong> for your archetype playbook. Use <strong>05_JOURNAL/</strong> to log your N-of-1 experiments as you adjust.</p></div>`;

  if (r.inbodyScan && r.inbodyScan.hasScan) {
    const s = r.inbodyScan;
    const hasCoreMetric = s.metrics.weight_kg || s.metrics.smm_kg || s.metrics.bfm_kg || s.metrics.bf_pct;
    if (!hasCoreMetric && !s.flags.length) { /* skip */ }
    else {
    html += `<div class="result fade-in" style="margin-top:16px;"><h2>InBody / DEXA Scan</h2>`;
    if (s.fileName) html += `<div style="font-size:11px;color:#71717a;margin:-8px 0 12px;">File: ${s.fileName}${s.scanDate?' | Scan date: '+s.scanDate:''}${s.device?' | Device: '+s.device:''}</div>`;
    html += `<div class="result-grid">`;
    const metricCards = [
      { label:'Weight', val:s.metrics.weight_kg, unit:'kg' },
      { label:'SMM', val:s.metrics.smm_kg, unit:'kg' },
      { label:'LBM', val:s.computed.lbm_kg, unit:'kg' },
      { label:'BFM', val:s.metrics.bfm_kg, unit:'kg' },
      { label:'BF%', val:s.metrics.bf_pct, unit:'%' },
      { label:'BMI', val:s.metrics.bmi, unit:'' },
      { label:'BMR', val:s.metrics.bmr_kcal, unit:'kcal' },
      { label:'Visceral Fat', val:s.metrics.visceral_fat, unit:'' },
      { label:'FFMI', val:s.computed.ffmi, unit:'' }
    ];
    metricCards.forEach(m => {
      if (m.val !== null && m.val !== undefined && m.val !== '') {
        html += `<div class="result-card"><div class="label">${m.label}</div><div class="val">${m.val}${m.unit?' <span style="font-size:11px;color:#71717a;font-weight:400;">'+m.unit+'</span>':''}</div></div>`;
      }
    });
    html += `</div>`;
    if (s.metrics.ecw_tbw_ratio !== null && s.metrics.ecw_tbw_ratio !== undefined) {
      const ratio = s.metrics.ecw_tbw_ratio;
      const pct = Math.min(ratio / 0.420 * 100, 100);
      let color, statusText;
      if (ratio < 0.380) { color = '#22c55e'; statusText = 'Normal'; }
      else if (ratio < 0.390) { color = '#eab308'; statusText = 'Borderline'; }
      else { color = '#ef4444'; statusText = 'Elevated'; }
      html += `<div class="result-section"><h3>ECW/TBW Ratio: ${ratio.toFixed(3)} <span style="font-weight:400;font-size:11px;color:${color};">(${statusText})</span></h3><div class="ratio-bar"><div class="ratio-bar-track"><div class="ratio-bar-fill" style="width:${pct}%;background:${color};"></div></div></div><div style="font-size:10px;color:#71717a;margin-top:2px;">Target &lt;0.380</div></div>`;
    }
    const segs = [
      { label:'R Arm', val:s.metrics.seg_rArm_kg },
      { label:'L Arm', val:s.metrics.seg_lArm_kg },
      { label:'Trunk', val:s.metrics.seg_trunk_kg },
      { label:'R Leg', val:s.metrics.seg_rLeg_kg },
      { label:'L Leg', val:s.metrics.seg_lLeg_kg }
    ];
    const hasSeg = segs.some(x => x.val !== null && x.val !== undefined && x.val !== '');
    if (hasSeg) {
      html += `<div class="result-section"><h3>Segmental Lean Mass (kg)</h3><div class="inbody-grid-5">`;
      segs.forEach(x => {
        html += `<div style="text-align:center;background:#27272a;border-radius:6px;padding:8px 4px;"><div style="font-size:18px;font-weight:700;color:#f4f4f5;">${x.val !== null && x.val !== undefined && x.val !== '' ? x.val : '-'}</div><div class="seg-label">${x.label}</div></div>`;
      });
      html += `</div></div>`;
    }
    if (s.flags && s.flags.length) {
      html += `<div class="result-section"><h3>Scan Flags</h3>${s.flags.map(f=>'<span class="flag-badge">'+f+'</span>').join('')}</div>`;
    }
    html += `</div>`;
    }
  }

  html += `</div>`;
  area.innerHTML = html;

  nav.innerHTML = `
    <button class="btn btn-primary" onclick="saveJSON()">Save Results as JSON</button>
    <button class="btn btn-secondary" onclick="resetForm()">Start Over</button>
  `;
}

// ----- Save JSON -----
function saveJSON() {
  if (!lastResult) return;
  const name = lastResult.name || (lastResult.answers && lastResult.answers.Q45) || '';
  const weight = lastResult.answers && lastResult.answers.Q46;
  if (!name || !weight) {
    const missing = [];
    if (!name) missing.push('Name (Section 1)');
    if (!weight) missing.push('Weight (Section 1)');
    alert('Please fill in: ' + missing.join(', ') + ' before saving.');
    return;
  }
  const output = {
    generatedAt: new Date().toISOString(),
    form: 'Muscle OS Client Intake v5.0',
    name: lastResult.name,
    height: lastResult.height,
    archetype: lastResult.archetype,
    scores: lastResult.scores,
    flags: lastResult.flags,
    constraintProfile: lastResult.constraintProfile,
    pillarPriorities: lastResult.pillarPriorities,
    trainingSplit: lastResult.trainingSplit,
    mainLifts: lastResult.mainLifts,
    targetWeight: lastResult.targetWeight,
    cardioProfile: lastResult.cardioProfile,
    sleepProfile: lastResult.sleepProfile,
    psychProfile: lastResult.psychProfile,
    nutritionDetail: lastResult.nutritionDetail,
    femaleHealth: lastResult.femaleHealth,
    healthHistory: lastResult.healthHistory,
    mentalHealth: lastResult.mentalHealth,
    inbodyScan: lastResult.inbodyScan || { hasScan:false },
    answers: lastResult.answers
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `muscle-os-intake-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetForm() {
  answers = {};
  submitted = false;
  lastResult = null;
  currentStep = 0;
  inbodyFileB64 = null;
  inbodyFileName = null;
  inbodyFileSize = null;
  inbodyData = { scanDate:'', device:'', weight_kg:'', smm_kg:'', bfm_kg:'', bf_pct:'', bmi:'', bmr_kcal:'', visceral_fat:'', tbw_L:'', icw_L:'', ecw_L:'', ecw_tbw_ratio:'', seg_rArm_kg:'', seg_lArm_kg:'', seg_trunk_kg:'', seg_rLeg_kg:'', seg_lLeg_kg:'' };
  document.getElementById('resultArea').innerHTML = '';
  render();
}

render();
</script>
